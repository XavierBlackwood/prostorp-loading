<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProstoRP - HL2 Beta Loading</title>
    <style>
        /* Импорт моноширинного шрифта */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(rgba(15, 15, 15, 0.85), rgba(15, 15, 15, 0.85)), 
                        url('https://static0.thegamerimages.com/wordpress/wp-content/uploads/2022/03/City-17-1.jpg?q=50&fit=crop&w=1600&h=900&dpr=1.5') no-repeat center center fixed;
            background-size: cover;
            color: #d1d1d1;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Декоративная индустриальная сетка поверх фона */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
        }

        /* CRT / Scanline эффект */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 118, 53, 0.02), rgba(255, 118, 53, 0.005), rgba(255, 118, 53, 0.02));
            background-size: 100% 4px, 6px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Сканирующая линия */
        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 10px;
            background: linear-gradient(to bottom, rgba(255,118,53,0), rgba(255,118,53,0.3) 50%, rgba(255,118,53,0));
            z-index: 11;
            pointer-events: none;
            opacity: 0.7;
            animation: scanlineMove 6s linear infinite;
        }

        @keyframes scanlineMove {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(calc(100vh + 100px)); }
        }

        /* Плавный эффект глюка интерфейса (исключительно геометрический, без изменения цвета) */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(1px, -2px); }
            100% { transform: translate(0); }
        }

        .glitch-effect {
            animation: glitch 4s infinite ease-in-out;
        }

        /* Верхняя панель: Время и IP */
        .top-hud {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            font-size: 1.1rem;
            color: #ff7635;
            border-bottom: 1px dashed rgba(255,118,53,0.3);
            padding-bottom: 10px;
            text-shadow: 0 0 5px rgba(255,118,53,0.4);
        }

        .container {
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
        }

        /* Логотип */
        .logo-container {
            margin-bottom: 15px;
            animation: pulse 3s infinite alternate;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 115, 60, 0.4));
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 10px rgba(255, 115, 60, 0.2)); }
            100% { filter: drop-shadow(0 0 25px rgba(255, 115, 60, 0.7)); }
        }

        /* Заголовок */
        h1 {
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #ffffff;
            text-shadow: 2px 2px 4px #000;
        }

        h1 span {
            color: #ff7635;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px #000;
        }

        /* Панель советов */
        .panel-box {
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #333;
            padding: 15px 20px;
            border-left: 4px solid #ff7635;
            backdrop-filter: blur(2px);
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 0.85rem;
            color: #ff7635;
            text-transform: uppercase;
            margin-bottom: 6px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            letter-spacing: 1px;
        }

        .tips-content {
            font-size: 0.95rem;
            color: #d1d1d1;
            line-height: 1.4;
            transition: opacity 0.4s ease;
        }

        .tips-content.fade-out {
            opacity: 0;
        }

        /* Блок прогресс-бара */
        .progress-wrapper {
            width: 100%;
            background-color: rgba(20, 20, 20, 0.9);
            border: 2px solid #333;
            padding: 20px;
            border-left: 5px solid #ff7635;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-info {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: #ff7635;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar-bg {
            width: 100%;
            height: 14px;
            background-color: #111;
            border: 1px solid #444;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #cc5520, #ff7635);
            box-shadow: 0 0 10px rgba(255, 118, 53, 0.6);
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body class="glitch-effect">

    <!-- CRT & Scanline элементы -->
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <!-- Аудиоплееры -->
    <audio id="bg-music" src="music.mp3" autoplay loop></audio>

    <!-- Верхний HUD: Время и IP сервера -->
    <div class="top-hud">
        <div>SERVER IP: <span style="color: #fff;">138.16.137.137:27017</span></div>
        <div id="live-clock">00:00:00</div>
    </div>

    <div class="container">
        <!-- Логотип -->
        <div class="logo-container">
            <img src="Frame 101.png" alt="Server Logo">
        </div>

        <!-- Название -->
        <h1>Souls Project <span>HL2 Beta</span></h1>
        <div class="subtitle">Подключение к защищенному узлу Альянса</div>

        <!-- Советы игрокам -->
        <div class="panel-box">
            <div class="panel-title">> Советы выжившим / ГО</div>
            <div class="tips-content" id="tips-box">Загрузка руководства по выживанию в зонах карантина...</div>
        </div>

        <!-- Прогресс-бар и лог загрузки клиента -->
        <div class="progress-wrapper">
            <div class="status-info">
                <span id="status-text">Инициализация клиента...</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Настройка громкости аудио
        const bgMusic = document.getElementById('bg-music');
        if (bgMusic) {
            bgMusic.volume = 0.25;
        }

        // Автогенерация тихого эмбиента City 17 поверх музыки через Web Audio API
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();
            
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 0.12;
            }

            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(160, audioCtx.currentTime);

            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);

            whiteNoise.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            window.addEventListener('click', () => {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }, { once: true });

            whiteNoise.start(0);
        } catch(e) {
            console.log("Web Audio ambient initialized");
        }

        // Обновление текущего времени
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Советы игрокам
        const tips = [
            "Соблюдайте комендантский час. Нарушители подлежат немедленному допросу.",
            "CID-карты граждан должны быть всегда при себе при перемещении по секторам.",
            "Избегайте заброшенных коллекторов: там высокая концентрация хедкрабов.",
            "При обнаружении подозрительных повстанческих элементов вызовите патруль.",
            "Пищевой концентрат выдается строго по расписанию в распределительных центрах."
        ];

        let tipIndex = 0;
        const tipsBox = document.getElementById('tips-box');

        function changeTip() {
            tipsBox.classList.add('fade-out');
            setTimeout(() => {
                tipIndex = (tipIndex + 1) % tips.length;
                tipsBox.innerText = tips[tipIndex];
                tipsBox.classList.remove('fade-out');
            }, 400);
        }
        setInterval(changeTip, 4500);
        tipsBox.innerText = tips[0];

        // Реалистичные файлы/события загрузки клиента (как у игрока в GMod / Source)
        const loadingSteps = [
            { text: "Connecting to 138.16.137.137:27017...", progress: 5 },
            { text: "Verifying RCON credentials token...", progress: 15 },
            { text: "Downloading file: materials/models/hl2beta/citizen_sheet.vtf", progress: 28 },
            { text: "Downloading file: models/player/combine_s_beta.mdl", progress: 42 },
            { text: "Downloading file: sound/ambient/city17_canal.wav", progress: 58 },
            { text: "Downloading file: maps/rp_city17_beta.bsp", progress: 75 },
            { text: "Precaching resources and models...", progress: 90 },
            { text: "Client initialized. Entering City 17...", progress: 100 }
        ];

        const progressFill = document.getElementById('progress-fill');
        const progressPercentage = document.getElementById('progress-percentage');
        const statusText = document.getElementById('status-text');

        let currentStepIndex = 0;
        let simulatedProgress = 0;

        const loadingInterval = setInterval(() => {
            if (currentStepIndex < loadingSteps.length) {
                const targetProgress = loadingSteps[currentStepIndex].progress;
                
                if (simulatedProgress < targetProgress) {
                    simulatedProgress += 1;
                }

                progressFill.style.width = simulatedProgress + '%';
                progressPercentage.innerText = simulatedProgress + '%';
                statusText.innerText = loadingSteps[currentStepIndex].text;

                if (simulatedProgress >= targetProgress) {
                    currentStepIndex++;
                }
            } else {
                clearInterval(loadingInterval);
                statusText.innerText = "Соединение установлено. Добро пожаловать!";
            }
        }, 60);
    </script>
</body>
</html>
